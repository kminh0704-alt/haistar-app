*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;color:#222;}
input,select,textarea,button{font-family:inherit;}
.hide{display:none!important;}

/* 로그인 */
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:24px;padding:50px 44px;width:390px;box-shadow:0 30px 70px rgba(0,0,0,.5);}
.login-icon{width:66px;height:66px;background:linear-gradient(135deg,#c0392b,#e74c3c);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;box-shadow:0 8px 24px rgba(192,57,43,.4);}
.login-title{color:#fff;font-size:20px;font-weight:900;text-align:center;}
.login-sub{color:rgba(255,255,255,.45);font-size:13px;text-align:center;margin-top:5px;margin-bottom:32px;}
.login-err{background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.5);color:#ff8a80;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;text-align:center;}
.login-inp{width:100%;padding:14px 15px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:14px;outline:none;display:block;margin-bottom:12px;}
.login-inp::placeholder{color:rgba(255,255,255,.35);}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(192,57,43,.4);}
.login-hint{margin-top:24px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:12px;color:rgba(255,255,255,.35);line-height:2;}

/* 헤더 */
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;box-shadow:0 2px 20px rgba(0,0,0,.3);position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:10px;}
.hlogo-icon{width:32px;height:32px;background:linear-gradient(135deg,#c0392b,#e74c3c);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hlogo-name{color:#fff;font-weight:900;font-size:15px;}
.hlogo-sub{color:rgba(255,255,255,.4);font-size:12px;margin-left:4px;}
.hright{display:flex;align-items:center;gap:10px;}
.user-badge{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:6px 13px;font-size:13px;color:rgba(255,255,255,.75);}
.admin-tag{background:#c0392b;color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:7px;font-weight:700;}
.logout-btn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 13px;font-size:12px;cursor:pointer;}

/* 탭 */
.tabs{background:#fff;border-bottom:2px solid #eee;padding:0 24px;display:flex;}
.tab-btn{padding:14px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:700;color:#888;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;}
.tab-btn.on{color:#c0392b;border-bottom-color:#c0392b;}

/* 콘텐츠 */
.content{padding:24px;max-width:1440px;margin:0 auto;}

/* 카드 */
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden;margin-bottom:16px;}
.card-hd{padding:13px 20px;}
.card-hd h3{color:#fff;font-size:14px;font-weight:800;margin:0;}
.card-bd{padding:16px 20px;}

/* 통계 카드 */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:18px 20px;border-left:4px solid #ccc;}
.stat-card .sl{font-size:12px;color:#aaa;font-weight:600;margin-bottom:6px;}
.stat-card .sv{font-size:20px;font-weight:900;color:#1a1a2e;}

/* 5열 통계 */
.stat5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}

/* 필터바 */
.fbar{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:13px 16px;margin-bottom:14px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.inp{padding:9px 12px;border:1px solid #e0e0e0;border-radius:9px;font-size:13px;outline:none;background:#fafafa;color:#333;}
.inp:focus{border-color:#c0392b;}
.inp-full{width:100%;}
.sel{padding:9px 12px;border:1px solid #e0e0e0;border-radius:9px;font-size:13px;outline:none;background:#fafafa;color:#333;cursor:pointer;}
.btn-p{padding:9px 17px;background:linear-gradient(135deg,#c0392b,#a93226);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-s{padding:9px 17px;background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-del{background:none;border:1px solid #fcc;border-radius:6px;color:#e74c3c;font-size:11px;padding:3px 8px;cursor:pointer;}

/* 알림 */
.alert{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:9px 15px;margin-bottom:12px;font-size:13px;color:#795548;font-weight:600;}

/* 테이블 */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:11px 13px;text-align:left;color:#555;font-weight:700;font-size:12px;border-bottom:2px solid #e8ecf0;background:#f8f9fa;white-space:nowrap;}
td{padding:10px 13px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:hover td{background:#fff5f5;}
.tc{text-align:center;}

/* 배지 */
.badge{padding:2px 9px;border-radius:11px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;display:inline-block;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:#fff;border-radius:20px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:30px;box-shadow:0 24px 64px rgba(0,0,0,.35);}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-hd h2{font-size:17px;font-weight:900;color:#1a1a2e;margin:0;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1;padding:0;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.fgrid-full{grid-column:1/-1;}
.lbl{display:block;font-size:12px;color:#888;font-weight:700;margin-bottom:4px;}
.fee-box{background:#f8f9fa;border-radius:13px;padding:16px;border:1px solid #eee;margin-top:16px;}
.fee-ttl{font-weight:700;font-size:13px;color:#333;margin-bottom:13px;}
.fee-total{display:flex;justify-content:space-between;background:#fff;border-radius:9px;padding:11px 14px;border:1px solid #e0e0e0;margin-top:11px;font-size:13px;}
.modal-foot{display:flex;gap:9px;margin-top:20px;justify-content:flex-end;}

/* 급여 행 */
.sal-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f3f3f3;}
.sal-lbl{font-size:13px;color:#555;}
.sal-val{font-size:13px;font-weight:600;color:#333;}

.sal-row.bold .sal-val{font-size:16px;font-weight:900;color:#c0392b;}
.sal-row.hl{background:#fffbf0;margin:0 -20px;padding:9px 20px;}

/* 수익 카드 */
.profit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:6px 0;}
.profit-card{border-radius:13px;padding:16px;text-align:center;}
.profit-card .pl{font-size:12px;color:#888;font-weight:600;margin-bottom:7px;}
.profit-card .pv{font-size:17px;font-weight:900;}

/* grid 2col */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.gfull{grid-column:1/-1;}

@media(max-width:700px){
  .stat-grid,.stat5,.grid2,.profit-grid{grid-template-columns:1fr 1fr;}
  .fgrid{grid-template-columns:1fr;}
  .fbar{flex-direction:column;align-items:stretch;}
}
</style>

      '<th class="tc">직원명</th><th class="tc">기본급</th><th class="tc">인센티브</th><th class="tc">실수령액</th>'+(isA?'<th></th>':'')+
      '</tr></thead><tbody>'+staffRows+
      '<tr style="background:#fffbf0;font-weight:800"><td class="tc" style="color:#795548">합 계</td><td class="tc" style="color:#795548">₩'+W(tb)+'</td><td class="tc" style="color:#795548">₩'+W(ti)+'</td><td class="tc" style="color:#c0392b;font-size:15px">₩'+W(ts)+'</td>'+(isA?'<td></td>':'')+'</tr>'+
      '</tbody></table></div>'+
      (isA?'<button class="btn-s" id="sadd" style="margin-top:11px;font-size:12px">＋ 직원 추가</button>':'')+
    '</div></div>'+
    (isA?'<div class="card gfull"><div class="card-hd" style="background:linear-gradient(135deg,#8e44ad,#7d3c98)"><h3>🏆 최종 수익 정산</h3></div><div class="card-bd"><div class="profit-grid">'+
      profCards.map(function(x){return '<div class="profit-card" style="background:'+x.c+'10;border:2px solid '+x.c+'30"><div class="pl">'+x.l+'</div><div class="pv" style="color:'+x.c+'">₩'+W(x.v)+'</div></div>';}).join("")+
    '</div></div></div>':'')+
    '</div>';
}

function bindMain(){
  document.getElementById("logout-btn").onclick=function(){G.user=null;R();};
  var tabs=document.querySelectorAll(".tab-btn");
  for(var i=0;i<tabs.length;i++){
    (function(b){b.onclick=function(){G.tab=b.dataset.tab;R();};})(tabs[i]);
  }
  if(G.tab==="contracts")bindContracts();
  else if(G.tab==="customers")bindCustomers();
  else bindSalary();
  if(G.cModal)bindContractModal();
  if(G.cuModal)bindCustomerModal();
}

function g(id){return document.getElementById(id);}

function bindContracts(){
  if(g("cs"))g("cs").oninput=function(){G.cSearch=this.value;R();};
  if(g("cy"))g("cy").onchange=function(){G.cYear=this.value;R();};
  if(g("cst"))g("cst").onchange=function(){G.cStaff=this.value;R();};
  if(g("ct"))g("ct").onchange=function(){G.cType=this.value;R();};
  if(g("cadd"))g("cadd").onclick=function(){G.cEdit=null;G.cModal=true;R();};
  var rows=document.querySelectorAll(".crow");
  for(var i=0;i<rows.length;i++){
    (function(row){
      row.onmouseover=function(){this.style.background="#fff5f5";};
      row.onmouseout=function(e){var idx=Array.prototype.indexOf.call(this.parentNode.children,this);this.style.background=idx%2===0?"#fff":"#fafbfc";};
      row.onclick=function(){
        var id=Number(this.dataset.cid);
        for(var j=0;j<CONTRACTS.length;j++){if(CONTRACTS[j].id===id){G.cEdit=CONTRACTS[j];break;}}
        G.cModal=true;R();
      };
    })(rows[i]);
  }
  var dels=document.querySelectorAll(".cdel");
  for(var i=0;i<dels.length;i++){
    (function(btn){
      btn.onclick=function(){
        if(confirm("이 계약을 삭제하시겠습니까?")){
          var id=Number(this.dataset.cid);
          CONTRACTS=CONTRACTS.filter(function(c){return c.id!==id;});R();
        }
      };
    })(dels[i]);
  }
}

function bindContractModal(){
  var close=function(){G.cModal=false;G.cEdit=null;R();};
  if(g("cmclose"))g("cmclose").onclick=close;
  if(g("cmclose2"))g("cmclose2").onclick=close;
  if(g("cmbg"))g("cmbg").onclick=function(e){if(e.target.id==="cmbg")close();};
  // 수수료 실시간
  ["cf_sf","cf_sv","cf_bf","cf_bv"].forEach(function(id){
    if(g(id))g(id).oninput=function(){
      var sf=(Number(g("cf_sf")&&g("cf_sf").value)||0)+(Number(g("cf_sv")&&g("cf_sv").value)||0);
      var bf=(Number(g("cf_bf")&&g("cf_bf").value)||0)+(Number(g("cf_bv")&&g("cf_bv").value)||0);
      var ft=g("fee_total");
      if(ft)ft.innerHTML='<span>매도: <b style="color:#e74c3c">₩'+W(sf)+'</b> &nbsp; 매수: <b style="color:#27ae60">₩'+W(bf)+'</b></span><b>총: ₩'+W(sf+bf)+'</b>';
    };
  });
  if(g("cmsave"))g("cmsave").onclick=function(){
    function gv(id){return g(id)?g(id).value:"";}
    var data={
      id:G.cEdit?G.cEdit.id:Date.now(),
      year:Number(gv("cf_year")),assignee:gv("cf_assignee"),
      cdate:gv("cf_cdate"),mdate:gv("cf_mdate"),fdate:gv("cf_fdate"),
      type:gv("cf_type"),amount:gv("cf_amount"),prop:gv("cf_prop"),
      sf:Number(gv("cf_sf"))||0,sv:Number(gv("cf_sv"))||0,
      bf:Number(gv("cf_bf"))||0,bv:Number(gv("cf_bv"))||0,
      note:gv("cf_note"),
    };
    if(G.cEdit){CONTRACTS=CONTRACTS.map(function(c){return c.id===data.id?data:c;});}
    else{CONTRACTS.push(data);}
    G.cModal=false;G.cEdit=null;R();
  };
}

function bindCustomers(){
  if(g("cus"))g("cus").oninput=function(){G.cuSearch=this.value;R();};
  if(g("cut"))g("cut").onchange=function(){G.cuType=this.value;R();};
  if(g("cuadd"))g("cuadd").onclick=function(){G.cuEdit=null;G.cuModal=true;R();};
  var scards=document.querySelectorAll("[data-cus]");
  for(var i=0;i<scards.length;i++){
    (function(el){el.onclick=function(){G.cuStatus=G.cuStatus===el.dataset.cus?"all":el.dataset.cus;R();};})(scards[i]);
  }
  var rows=document.querySelectorAll(".curow");
  for(var i=0;i<rows.length;i++){
    (function(row){
      row.onmouseover=function(){this.style.background="#fff5f5";};
      row.onmouseout=function(e){var idx=Array.prototype.indexOf.call(this.parentNode.children,this);this.style.background=idx%2===0?"#fff":"#fafbfc";};
      row.onclick=function(){
        var id=Number(this.dataset.cuid);
        for(var j=0;j<CUSTOMERS.length;j++){if(CUSTOMERS[j].id===id){G.cuEdit=CUSTOMERS[j];break;}}
        G.cuModal=true;R();
      };
    })(rows[i]);
  }
  var dels=document.querySelectorAll(".cudel");
  for(var i=0;i<dels.length;i++){
    (function(btn){btn.onclick=function(){if(confirm("삭제하시겠습니까?")){var id=Number(this.dataset.cuid);CUSTOMERS=CUSTOMERS.filter(function(c){return c.id!==id;});R();}};})(dels[i]);
  }
}

function bindCustomerModal(){
  var close=function(){G.cuModal=false;G.cuEdit=null;R();};
  if(g("cumclose"))g("cumclose").onclick=close;
  if(g("cumclose2"))g("cumclose2").onclick=close;
  if(g("cumbg"))g("cumbg").onclick=function(e){if(e.target.id==="cumbg")close();};
  if(g("cumsave"))g("cumsave").onclick=function(){
    function gv(id){return g(id)?g(id).value:"";}
    var data={
      id:G.cuEdit?G.cuEdit.id:Date.now(),
      name:gv("cuf_name"),phone:gv("cuf_phone"),type:gv("cuf_type"),
      budget:gv("cuf_budget"),desired:gv("cuf_desired"),memo:gv("cuf_memo"),
      status:gv("cuf_status"),assignee:gv("cuf_assignee"),rdate:gv("cuf_rdate"),
    };
    if(G.cuEdit){CUSTOMERS=CUSTOMERS.map(function(c){return c.id===data.id?data:c;});}
    else{CUSTOMERS.push(data);}
    G.cuModal=false;G.cuEdit=null;R();
  };
}

function bindSalary(){
  var isA=G.user.role==="admin";
  if(g("sal_month"))g("sal_month").onchange=function(){SALARY.month=this.value;};
  if(isA){
    var pairs=[["sal_rr","rr"],["sal_ro","ro"],["sal_eo","eo"],["sal_ea","ea"],["sal_ed","ed"],["sal_em","em"]];
    pairs.forEach(function(p){if(g(p[0]))g(p[0]).onchange=function(){SALARY[p[1]]=Number(this.value)||0;R();};});
    if(g("sadd"))g("sadd").onclick=function(){SALARY.staff.push({name:"새 직원",base:0,inc:0});R();};
    var dels=document.querySelectorAll(".sdel");
    for(var i=0;i<dels.length;i++){
      (function(btn){btn.onclick=function(){if(confirm("삭제할까요?")){SALARY.staff.splice(Number(btn.dataset.si),1);R();}};})(dels[i]);
    }
    SALARY.staff.forEach(function(_,i){
      if(g("sn_"+i))g("sn_"+i).onchange=function(){SALARY.staff[i].name=this.value;R();};
      if(g("sb_"+i))g("sb_"+i).onchange=function(){SALARY.staff[i].base=Number(this.value)||0;R();};
      if(g("si_"+i))g("si_"+i).onchange=function(){SALARY.staff[i].inc=Number(this.value)||0;R();};
    });
  } else {
    SALARY.staff.forEach(function(_,i){
      if(g("si_"+i))g("si_"+i).onchange=function(){SALARY.staff[i].inc=Number(this.value)||0;R();};
    });
  }
}

// 시작
R();
</script>
