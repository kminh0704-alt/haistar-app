<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>광교이편한세상 계약관리시스템</title>
<!-- ★ 휴대폰 홈 화면에 추가하면 앱처럼 보이도록 -->
<link rel="manifest" href="manifest-v2.json">
<meta name="theme-color" content="#1a1a2e">
<link rel="icon" href="icon-192-계약.png">
<link rel="apple-touch-icon" href="icon-192-계약.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#f0f2f5;color:#222;font-size:13px;}
input,select,textarea,button{font-family:inherit;font-size:13px;}
.hide{display:none!important;}

/* 로그인 */
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:24px;padding:48px 42px;width:380px;}
.login-icon{width:64px;height:64px;background:linear-gradient(135deg,#e67e22,#f39c12);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
.login-title{color:#fff;font-size:19px;font-weight:900;text-align:center;}
.login-sub{color:rgba(255,255,255,.4);font-size:12px;text-align:center;margin:4px 0 28px;}
.lerr{background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.5);color:#ff8a80;padding:9px 14px;border-radius:10px;font-size:12px;margin-bottom:12px;text-align:center;}
.linp{width:100%;padding:13px 14px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:11px;color:#fff;outline:none;display:block;margin-bottom:10px;}
.linp::placeholder{color:rgba(255,255,255,.3);}
.lbtn{width:100%;padding:14px;background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;}
.lhint{margin-top:20px;padding:12px;background:rgba(255,255,255,.04);border-radius:10px;font-size:11px;color:rgba(255,255,255,.3);line-height:1.9;}

/* 헤더 & 탭 */
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:500;box-shadow:0 2px 16px rgba(0,0,0,.3);}
.hlogo{display:flex;align-items:center;gap:9px;}
.hlogo-icon{width:30px;height:30px;background:linear-gradient(135deg,#e67e22,#f39c12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.hlogo-name{color:#fff;font-weight:900;font-size:14px;}
.hlogo-sub{color:rgba(255,255,255,.35);font-size:11px;}
.hright{display:flex;align-items:center;gap:8px;}
.ubadge{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 11px;font-size:12px;color:rgba(255,255,255,.7);}
.atag{background:#e67e22;color:#fff;font-size:9px;padding:1px 6px;border-radius:6px;margin-left:6px;font-weight:700;}
.logbtn{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.13);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;}
.tabs{position:sticky;top:56px;z-index:400;background:#fff;border-bottom:2px solid #eee;padding:0 20px;display:flex;gap:2px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.tbtn{padding:13px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:700;color:#888;border-bottom:3px solid transparent;white-space:nowrap;}
.tbtn.on{color:#e67e22;border-bottom-color:#e67e22;}
.content{padding:18px;max-width:1440px;margin:0 auto;}

/* 공통 컴포넌트 */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;}
.scard{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:15px 16px;border-left:4px solid #ccc;}
.scard .sl{font-size:11px;color:#aaa;font-weight:600;margin-bottom:5px;}
.scard .sv{font-size:18px;font-weight:900;color:#1a1a2e;}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden;margin-bottom:14px;}
.card-hd{padding:12px 18px;}
.card-hd h3{color:#fff;font-size:13px;font-weight:800;}
.card-bd{padding:14px 18px;}
.inp{padding:8px 11px;border:1px solid #e0e0e0;border-radius:8px;outline:none;background:#fafafa;color:#333;}
.inp:focus{border-color:#e67e22;}
.inp-full{width:100%;}
.btn-p{padding:8px 15px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-p:hover{opacity:.9;}
.btn-s{padding:8px 15px;background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-del{background:none;border:1px solid #fcc;border-radius:5px;color:#e74c3c;font-size:10px;padding:2px 7px;cursor:pointer;}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;display:inline-block;}
.info-box{background:#e3f2fd;border:1px solid #90caf9;border-radius:9px;padding:8px 13px;margin-bottom:10px;font-size:12px;color:#1565c0;font-weight:600;}
.tc{text-align:center;}
.lbl{display:block;font-size:11px;color:#888;font-weight:700;margin-bottom:3px;}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.btn-reset{padding:7px 14px;background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9000;padding:14px;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-hd h2{font-size:16px;font-weight:900;color:#1a1a2e;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fgrid-full{grid-column:1/-1;}
.fee-box{background:#f8f9fa;border-radius:11px;padding:14px;border:1px solid #eee;margin-top:14px;}
.fee-ttl{font-weight:700;font-size:12px;color:#333;margin-bottom:11px;}
.fee-total{display:flex;justify-content:space-between;background:#fff;border-radius:8px;padding:9px 12px;border:1px solid #e0e0e0;margin-top:9px;font-size:12px;}
.modal-foot{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}

/* 급여정산 */
.sal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f3f3;}
.sal-lbl{font-size:12px;color:#555;}
.sal-val{font-size:12px;font-weight:600;color:#333;}
.sal-row.bld .sal-lbl{font-weight:800;color:#1a1a2e;}
.sal-row.bld .sal-val{font-size:15px;font-weight:900;color:#e74c3c;}
.sal-row.hl{background:#fffbf0;margin:0 -18px;padding:8px 18px;}
.profit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.pcrd{border-radius:11px;padding:14px;text-align:center;}
.pcrd .pl{font-size:11px;color:#888;font-weight:600;margin-bottom:5px;}
.pcrd .pv{font-size:16px;font-weight:900;}
.profit-hidden-card{background:#f5f5f5!important;border:2px dashed #ddd!important;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.gfull{grid-column:1/-1;}
.pct-wrap{display:flex;align-items:center;gap:3px;}
.pct-inp{width:65px!important;text-align:right;}
.pct-label{font-size:11px;color:#888;}

/* 매달납부 */
.mnth-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.mnth-card{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:14px 16px;}
.mnth-card h4{font-size:12px;font-weight:800;color:#1a1a2e;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #eee;}
.mnth-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px;}
.mnth-name{color:#555;flex:1;}
.mnth-amt{font-weight:700;color:#333;}
.mnth-total{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:2px solid #eee;font-size:12px;font-weight:800;color:#e67e22;}
.mnth-inp{width:110px;text-align:right;border:1px solid #e8e8e8;border-radius:6px;padding:3px 7px;font-size:12px;font-weight:700;color:#333;background:#fff;}
.mnth-inp:focus{border-color:#e74c3c;outline:none;}

/* ★ 계약관리 테이블 */
.ctbl-wrap{border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);overflow:hidden;background:#fff;}
.ctbl-actbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border-bottom:1px solid #f0f0f0;}

/* ★ 테이블 - thead sticky */
.ctbl-scroll{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 280px);}
.ctbl{width:100%;border-collapse:collapse;font-size:12px;}
.ctbl thead{position:sticky;top:0;z-index:200;}
.ctbl thead tr{background:linear-gradient(135deg,#e67e22,#f39c12);}
.ctbl thead th{padding:0;border:none;white-space:nowrap;vertical-align:middle;}
.ctbl tbody tr{background:#fff;}
.ctbl tbody tr:nth-child(even){background:#fafbfc;}
.ctbl tbody tr:hover{background:#fff5eb!important;cursor:pointer;}
.ctbl tbody td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle;font-size:12px;}

/* ★ 헤더 필터 버튼 */
.fth-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:10px 10px;
  background:none;border:none;cursor:pointer;
  color:#fff;font-size:11px;font-weight:700;
  white-space:nowrap;gap:4px;
  min-width:60px;
}
.fth-btn:hover,.fth-btn.open{background:rgba(0,0,0,.15);}
.fth-btn.active{background:rgba(0,0,0,.2);}
.fth-tri{font-size:8px;opacity:.7;flex-shrink:0;}
.fth-badge{background:rgba(255,255,255,.95);color:#e67e22;border-radius:6px;padding:0 4px;font-size:9px;font-weight:900;flex-shrink:0;}
.fth-plain{display:flex;align-items:center;padding:10px 10px;color:#fff;font-size:11px;font-weight:700;white-space:nowrap;}

/* ★ 드롭다운 패널 - position:fixed로 뷰포트 기준 배치 */
#dd-panel{
  position:fixed;
  background:#fff;
  border:1px solid #ddd;
  border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  width:220px;
  z-index:9999;
  overflow:hidden;
  display:none;
}
#dd-panel.show{display:block;}
.dd-hd{padding:10px 12px 6px;border-bottom:1px solid #f0f0f0;}
.dd-search{width:100%;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;outline:none;}
.dd-search:focus{border-color:#e67e22;}
.dd-acts{display:flex;gap:0;padding:4px 12px 6px;border-bottom:1px solid #f0f0f0;}
.dd-abt{background:none;border:none;font-size:11px;color:#2980b9;cursor:pointer;padding:3px 6px;font-weight:600;}
.dd-abt:hover{text-decoration:underline;}
.dd-list{max-height:220px;overflow-y:auto;padding:4px 0;}
.dd-item{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12px;color:#333;cursor:pointer;user-select:none;}
.dd-item:hover{background:#fff8f0;}
.dd-item input[type=checkbox]{accent-color:#e67e22;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.dd-sort{display:flex;gap:8px;padding:8px 12px 4px;}
.dd-sort-btn{flex:1;padding:6px;background:#f8f8f8;border:1px solid #e0e0e0;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;color:#555;display:flex;align-items:center;justify-content:center;gap:3px;}
.dd-sort-btn:hover{background:#f0f0f0;}
.dd-ft{display:flex;justify-content:flex-end;gap:7px;padding:8px 12px;border-top:1px solid #f0f0f0;background:#fafafa;}
.dd-cancel{padding:5px 14px;background:#f0f0f0;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}
.dd-ok{padding:5px 16px;background:linear-gradient(135deg,#e67e22,#f39c12);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}

/* ===== 매달납부 새 레이아웃 ===== */
.mnth-panel{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden;}
.mnth-panel-hd{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;color:#fff;font-size:13px;font-weight:800;}
.mnth-tbl{width:100%;border-collapse:collapse;}
.mnth-tbl tbody tr:hover{background:#f8f9fa;}
.mnth-td-name{padding:7px 14px;font-size:12px;color:#333;border-bottom:1px solid #f0f0f0;}
.mnth-td-amt{padding:7px 14px;text-align:right;border-bottom:1px solid #f0f0f0;white-space:nowrap;}
.mnth-tbl tfoot td{padding:10px 14px;background:#f8f9fa;border-top:2px solid #e0e0e0;}
.mnth-tbl tfoot .mnth-td-amt{text-align:right;}
.mnth-inp{width:110px;text-align:right;border:1px solid #e8e8e8;border-radius:6px;padding:3px 7px;font-size:12px;font-weight:700;color:#333;background:#fff;}
.mnth-inp:focus{border-color:#e74c3c;outline:none;}

.ddp-float{position:fixed;display:none;background:#fff;border:1px solid #ddd;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.2);width:220px;z-index:9999;overflow:hidden;}
</style>
<script type="module">
// ========== Firebase 초기화 ==========
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCqibn-V0grzDG29xUlZpEChDFRlbXLSKw",
  authDomain: "gwanggyo-crm.firebaseapp.com",
  projectId: "gwanggyo-crm",
  storageBucket: "gwanggyo-crm.firebasestorage.app",
  messagingSenderId: "572437571620",
  appId: "1:572437571620:web:cbd90b5d7662c7c09710b1",
  measurementId: "G-S24ZXKVRHV"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ========== Firestore 저장/불러오기 함수 ==========
// 계약 데이터
window.fbSaveContracts = async function(contracts){
  try{
    await setDoc(doc(db,"realestate","contracts"),{data:JSON.stringify(contracts),updatedAt:new Date().toISOString()});
    return true;
  }catch(e){console.error("계약 저장 오류:",e);return false;}
};
window.fbLoadContracts = async function(){
  try{
    var snap=await getDoc(doc(db,"realestate","contracts"));
    if(snap.exists()){return JSON.parse(snap.data().data);}
  }catch(e){console.error("계약 불러오기 오류:",e);}
  return null;
};

// 매달납부 데이터
window.fbSaveMonthly = async function(monthlyEdits){
  try{
    await setDoc(doc(db,"realestate","monthly"),{data:JSON.stringify(monthlyEdits),updatedAt:new Date().toISOString()});
    return true;
  }catch(e){console.error("납부 저장 오류:",e);return false;}
};
window.fbLoadMonthly = async function(){
  try{
    var snap=await getDoc(doc(db,"realestate","monthly"));
    if(snap.exists()){return JSON.parse(snap.data().data);}
  }catch(e){console.error("납부 불러오기 오류:",e);}
  return null;
};

// 매달납부 월 구조 (사용자가 새로 추가한 월 목록) - 새로고침/재로그인해도 유지되도록 별도 저장
window.fbSaveMonthlyStructure = async function(monthly){
  try{
    await setDoc(doc(db,"realestate","monthly_structure"),{data:JSON.stringify(monthly),updatedAt:new Date().toISOString()});
    return true;
  }catch(e){console.error("월구조 저장 오류:",e);return false;}
};
window.fbLoadMonthlyStructure = async function(){
  try{
    var snap=await getDoc(doc(db,"realestate","monthly_structure"));
    if(snap.exists()){return JSON.parse(snap.data().data);}
  }catch(e){console.error("월구조 불러오기 오류:",e);}
  return null;
};

// 급여 데이터 (월별)
window.fbSaveSalary = async function(month, salData, incPct){
  try{
    await setDoc(doc(db,"realestate","salary_"+month),{
      sal:JSON.stringify(salData),
      pct:JSON.stringify(incPct),
      updatedAt:new Date().toISOString()
    });
    return true;
  }catch(e){console.error("급여 저장 오류:",e);return false;}
};
window.fbLoadSalary = async function(month){
  try{
    var snap=await getDoc(doc(db,"realestate","salary_"+month));
    if(snap.exists()){return {sal:JSON.parse(snap.data().sal),pct:JSON.parse(snap.data().pct)};}
  }catch(e){console.error("급여 불러오기 오류:",e);}
  return null;
};

// 기타수수료 데이터
window.fbSaveExtraFees = async function(fees){
  try{
    await setDoc(doc(db,"realestate","extrafees"),{data:JSON.stringify(fees),updatedAt:new Date().toISOString()});
    return true;
  }catch(e){console.error("기타수수료 저장 오류:",e);return false;}
};
window.fbLoadExtraFees = async function(){
  try{
    var snap=await getDoc(doc(db,"realestate","extrafees"));
    if(snap.exists()){return JSON.parse(snap.data().data);}
  }catch(e){console.error("기타수수료 불러오기 오류:",e);}
  return null;
};

// ========== 앱 시작 시 Firestore에서 데이터 로드 ==========
window.fbLoaded = false;
window.fbInit = async function(){
  console.log("🔥 Firebase 데이터 로딩...");
  var showMsg = function(msg){
    var el=document.getElementById("fb-loading");
    if(el)el.textContent=msg;
  };
  showMsg("☁️ 서버에서 데이터 불러오는 중...");

  // 계약 데이터 로드
  var contracts = await window.fbLoadContracts();
  if(contracts && contracts.length>0){
    window.CONTRACTS = contracts;
    console.log("✅ 계약 로드:", contracts.length,"건");
  }

  // 매달납부 로드
  var monthly = await window.fbLoadMonthly();
  if(monthly){
    window.MONTHLY_EDITS = monthly;
    console.log("✅ 납부 로드 완료");
  }

  // 매달납부 월 구조 로드 (새로 추가된 월이 있으면 병합)
  var monthlyStructure = await window.fbLoadMonthlyStructure();
  if(monthlyStructure && window.MONTHLY){
    Object.keys(monthlyStructure).forEach(function(k){
      if(!window.MONTHLY[k]) window.MONTHLY[k]=monthlyStructure[k];
    });
    try{localStorage.setItem("gg_monthly_extra", JSON.stringify(window.MONTHLY));}catch(e){}
    console.log("✅ 월구조 로드 완료");
  }

  // 기타수수료 로드
  var fees = await window.fbLoadExtraFees();
  if(fees){
    window.EXTRAFEES = fees;
    console.log("✅ 기타수수료 로드 완료");
  }

  // 급여 로드 (현재 월)
  var salMonth = window.SAL ? window.SAL.month : "2026-05";
  var salData = await window.fbLoadSalary(salMonth);
  if(salData){
    Object.assign(window.SAL, salData.sal);
    window.G && (window.G.salIncPct = salData.pct);
    console.log("✅ 급여 로드 완료");
  }

  window.fbLoaded = true;
  showMsg("");

// 월별 SAL 저장/불러오기
function salKey(month){ return "sal_"+month; }
function salPctKey(month){ return "salp_"+month; }
function saveSAL(){
  var month=SAL.month;
  try{localStorage.setItem(salKey(month),JSON.stringify(SAL));}catch(e){}
  try{localStorage.setItem(salPctKey(month),JSON.stringify(G.salIncPct));}catch(e){}
  // Firestore 동기화
  if(window.fbSaveSalary) window.fbSaveSalary(month,SAL,G.salIncPct);
}
function applySavedSal(saved,month){
  SAL.month=saved.month||month;
  SAL.rr=saved.rr||0; SAL.ro=saved.ro||0; SAL.ro_memo=saved.ro_memo||'';
  SAL.eo=saved.eo||0; SAL.ea=saved.ea||0;
  SAL.ed=saved.ed||0; SAL.em=saved.em||0; SAL.em_memo=saved.em_memo||'';
  // ★ 기타 항목(여러 개): 저장된 emItems가 있으면 그대로, 없으면 salaryHTML() 렌더링 시 em/em_memo로부터 자동 이관
  SAL.emItems=(saved.emItems&&Array.isArray(saved.emItems))?saved.emItems:undefined;
  SAL.hideProfit=saved.hideProfit||false;
  // ★ staff 완전 교체
  if(saved.staff&&saved.staff.length>0) SAL.staff=saved.staff;
}
function loadSAL(month){
  // 1) 로컬 캐시가 있으면 우선 즉시 반영 (화면이 비어보이지 않도록)
  try{
    var sd=localStorage.getItem(salKey(month));
    if(sd) applySavedSal(JSON.parse(sd),month);
    var sp=localStorage.getItem(salPctKey(month));
    if(sp) G.salIncPct=JSON.parse(sp);
    else G.salIncPct={};
  }catch(e){}

  //    서버(Firestore)에서 해당 월의 최신 데이터를 다시 받아와 반영한다.

var CF={assignee:[],year:[],cdate:[],mdate:[],fdate:[],type:[],prop:[],amount:[],status:[],note:[]};

function getColVals(field){
  var set={};
  CONTRACTS.forEach(function(c){
    var v;
    if(field==="status") v=statusOf(c);
    else if(field==="cdate"||field==="mdate"||field==="fdate") v=fmtYM(c[field])||"";
    else v=String(c[field]||"").trim();
    if(v) set[v]=1;
  });
  var keys=Object.keys(set).filter(Boolean);
  if(field==="year"||field==="cdate"||field==="mdate"||field==="fdate")
    keys.sort(function(a,b){return b>a?1:-1;});
  else keys.sort();
  return keys;
}
function applyAllFilters(list){
  // ★ 직원(staff)은 본인 이름이 포함된 계약만 표시
  if(G.user&&G.user.role==="staff"){
    var myName=G.user.name.replace(/ 실장님?| 직원| 소장님?/g,"").trim();
    list=list.filter(function(c){
      return c.assignee&&c.assignee.indexOf(myName)>=0;
    });
  }
  // ★ 검색어 필터
  if(G.cSearch&&G.cSearch.trim()){
    var q=G.cSearch.trim().toLowerCase();
    list=list.filter(function(c){
      return (c.prop||"").toLowerCase().indexOf(q)>=0||
             (c.assignee||"").toLowerCase().indexOf(q)>=0||
             (c.amount||"").toLowerCase().indexOf(q)>=0||
             (c.note||"").toLowerCase().indexOf(q)>=0||
             (c.type||"").toLowerCase().indexOf(q)>=0;
    });
  }
  var result=list.filter(function(c){
    if(CF.assignee.length&&CF.assignee.indexOf(c.assignee.trim())<0)return false;
    if(CF.year.length&&CF.year.indexOf(String(c.year))<0)return false;
    if(CF.cdate.length&&CF.cdate.indexOf(fmtYM(c.cdate)||"")<0)return false;
    if(CF.mdate.length&&CF.mdate.indexOf(fmtYM(c.mdate)||"")<0)return false;
    if(CF.fdate.length&&CF.fdate.indexOf(fmtYM(c.fdate)||"")<0)return false;
    if(CF.type.length&&CF.type.indexOf(c.type)<0)return false;
    if(CF.prop.length&&CF.prop.indexOf(String(c.prop||"").trim())<0)return false;
    if(CF.amount.length&&CF.amount.indexOf(String(c.amount||"").trim())<0)return false;
    if(CF.status.length){var s=statusOf(c);if(CF.status.indexOf(s)<0)return false;}
    if(CF.note.length&&CF.note.indexOf(String(c.note||"").trim())<0)return false;
    return true;
  });
  // 정렬
  if(ddCurrentSort.field){
    var f=ddCurrentSort.field,dir=ddCurrentSort.dir;
    result.sort(function(a,b){
      var av=f==="status"?statusOf(a):String(a[f]||"");
      var bv=f==="status"?statusOf(b):String(b[f]||"");
      return dir==="asc"?(av>bv?1:-1):(av<bv?1:-1);
    });
  }
  return result;
}

}

function ddOpen(field, btnEl){
  var panel=document.getElementById("dd-panel");
  if(!panel)return;
  if(ddCurrentField===field&&panel.style.display!=="none"){ddClose();return;}
  ddCurrentField=field;

  // 리스트만 채움 (패널 구조는 고정 HTML)
  var vals=getColVals(field);
  var sel=CF[field]||[];
  var list=document.getElementById("dd-list");
  if(list){
    list.innerHTML=vals.map(function(v){
      var chk=sel.length===0||sel.indexOf(v)>=0;
      return '<label style="display:flex;align-items:center;gap:8px;padding:5px 14px;font-size:12px;color:#333;cursor:pointer">'+
        '<input type="checkbox" data-val="'+encodeURIComponent(v)+'"'+(chk?" checked":"")+' style="accent-color:#e67e22;width:14px;height:14px;cursor:pointer">'+
        v+'</label>';
    }).join("");
  }

  // 검색창 초기화
  var srch=document.getElementById("dd-search-inp");
  if(srch){srch.value="";srch.oninput=function(){ddSearchFilter(this.value);};}

  // 버튼 이벤트 (매번 덮어씌워서 중복 방지)
  var asc=document.getElementById("dd-asc");
  var desc=document.getElementById("dd-desc");
  var all=document.getElementById("dd-all");
  var none=document.getElementById("dd-none");
  var cancel=document.getElementById("dd-cancel");
  var ok=document.getElementById("dd-ok");
  if(asc)asc.onclick=function(){ddSort("asc");};
  if(desc)desc.onclick=function(){ddSort("desc");};
  if(all)all.onclick=ddSelectAll;
  if(none)none.onclick=ddClearAll;
  if(cancel)cancel.onclick=ddCancel;
  if(ok)ok.onclick=ddConfirm;

  // 위치 계산
  panel.style.display="block";
  var rect=btnEl.getBoundingClientRect();
  var pw=220;
  var left=rect.left;
  if(left+pw>window.innerWidth-8)left=rect.right-pw;
  panel.style.left=Math.max(4,left)+"px";
  panel.style.top=(rect.bottom+2)+"px";
  if(srch)srch.focus();
}

function ddClose(){
  ddCurrentField="";
  var panel=document.getElementById("dd-panel");
  if(panel)panel.style.display="none";
  document.querySelectorAll(".fth-btn").forEach(function(b){b.classList.remove("open");});

function ddSearchFilter(q){

  list.querySelectorAll("label").forEach(function(el){
    var v=el.querySelector("input").dataset.val;

function ddSelectAll(){
  var list=document.getElementById("dd-list");

}
function ddClearAll(){
  var list=document.getElementById("dd-list");

}
function ddCancel(){ddClose();}
function ddConfirm(){
  if(!ddCurrentField)return;
  var list=document.getElementById("dd-list");
  var chks=list?list.querySelectorAll("input[type=checkbox]"):[];
  var sel=[];
  chks.forEach(function(el){if(el.checked)sel.push(decodeURIComponent(el.dataset.val));});
  var vals=getColVals(ddCurrentField);
  CF[ddCurrentField]=(sel.length===vals.length)?[]:sel;
  ddClose();R();
}

function fthClick(field, event){

function fmt(d){if(!d||d==="-")return d||"";return String(d).replace(/(\d{4})-(\d{2})-(\d{2})/,"$1.$2.$3");}
function fmtYM(d){if(!d)return "";var m=String(d).match(/(\d{4})-(\d{2})/);return m?m[1]+"-"+m[2]:"";}
function W(n){if(n===null||n===undefined||n==="")return "-";var v=Number(n);if(isNaN(v))return String(n);return v.toLocaleString();}
function tfee(c){return (c.sf||0)+(c.bf||0);}
// ★ 일반수수료 재계산: 해당 월이 잔금월인 계약들의 수수료(매도+매수) 합계
function recalcRR(){
  var t=0;
  CONTRACTS.forEach(function(c){
    if(c.fdate && fmtYM(c.fdate)===SAL.month) t+=tfee(c);
  });
  SAL.rr=t;
}
// ★ 사무실지출 "기타" 항목을 여러 개 등록할 수 있도록 배열로 관리 (기존 단일 em/em_memo 데이터는 자동 이관)
function ensureEmItems(d){
  if(!d.emItems||!Array.isArray(d.emItems)){
    d.emItems=(d.em||d.em_memo)?[{memo:d.em_memo||"",amt:Number(d.em)||0}]:[];
  }
}

function tc(t){if(!t)return "#7f8c8d";var k=Object.keys(TC).find(function(k){return t.indexOf(k)>=0;});return k?TC[k]:"#7f8c8d";}
function done(d){if(!d||d==="-")return false;return new Date(d)<=new Date();}
// ★ 상태: 잔금일 전=진행중 / 잔금일 지났지만 수수료(금액) 미입력=미결 / 잔금일 지났고 수수료 입력됨=완결
function statusOf(c){if(!done(c.fdate))return "진행중";return tfee(c)>0?"완결":"미결";}

function salaryHTML(){
  var u=G.user, isA=u.role==="admin";
  var d=SAL;
  ensureEmItems(d);

  // ★ SAL.month(2026-05) → G.mMonth(26-5) 자동 동기화
  (function(){
    var parts=d.month.split("-");
    if(parts.length===2){
      var yr=parts[0].slice(2);
      var mo=String(parseInt(parts[1]));
      var mKey=yr+"-"+mo;
      if(MONTHLY[mKey]) G.mMonth=mKey;
    }
  })();

  // 매달납부 사무실지출 자동반영
  var monLeftTotal=0;
  var LEFT_NAMES=["반찬값","전기요금","삼성SDS 전화기","삼성SDS 부가서비스","사무실 팩스","사무실 인터넷","SK쉴더스","s k 쉴더스","쉴더스","음식물쓰레기","음식물쓰레기 관리비","사무실 업무폰","복합기","삼성화재","삼성 화재","상가공용요금","이유진 소장 핸드폰","102호 월세","102호 월세(현금)","103호 뒤 사무실 월세","세무사기장","한공협회비","정수기","렛츠"];
  (MONTHLY[G.mMonth]||[]).forEach(function(it){
    if(it.sub==="정육"||it.name.indexOf("컨설팅")>=0||it.name.indexOf("김민학")>=0) return;
    if(LEFT_NAMES.some(function(n){return it.name.toLowerCase().indexOf(n.toLowerCase())>=0||n.toLowerCase().indexOf(it.name.toLowerCase())>=0;}))
      monLeftTotal+=getMA(G.mMonth,it.sub,it.name,it.amt||0);

  var leftIdxs=[],rightIdxs=[];
  items.forEach(function(it,idx){

             n.toLowerCase().indexOf(it.name.toLowerCase())>=0;

    // sub이 정육이면 무조건 오른쪽

      '</td>'+

// ====================== 거래내역 파싱 ======================
function parseMonthlyExcel(filename, arrayBuffer){
  // ★ 농협 xls / 기업은행 xlsx 거래내역 파싱 → 매달납부 금액 자동 반영
  var bytes=new Uint8Array(arrayBuffer);
  var isXls=(bytes[0]===0xD0&&bytes[1]===0xCF); // CFB magic
  
  if(isXls){
    parseNhXls(bytes);
  } else {
    // xlsx: SheetJS 사용
    if(!window.XLSX){alert("xlsx 라이브러리 로딩 실패");return;}
    var wb=window.XLSX.read(arrayBuffer,{type:"array"});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=window.XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
    parseRowsToMonthly(rows, filename);
  }
}
function parseNhXls(bytes){
  // CFB → Workbook 스트림 추출 → BIFF8 파싱
  var dv=new DataView(bytes.buffer,bytes.byteOffset,bytes.byteLength);
  var sectorSize=Math.pow(2, dv.getUint16(30,true));
  var firstDir=dv.getUint32(48,true);
  
  function readSector(n){
    var off=(n+1)*sectorSize;
    return bytes.slice(off, off+sectorSize);
  }
  
  // FAT 구성
  var fatSector=dv.getUint32(76,true);
  var fatData=readSector(fatSector);
  var fatDv=new DataView(fatData.buffer,fatData.byteOffset,fatData.byteLength);
  var fat=[];
  for(var i=0;i<fatData.length/4;i++) fat.push(fatDv.getUint32(i*4,true));
  
  function readChain(start){
    var chunks=[],cur=start;
    var visited={};
    while(cur<0xFFFFFFFE&&!visited[cur]){
      visited[cur]=1;
      var sec=readSector(cur);
      // ★ sec는 bytes의 뷰일 수 있으므로 값 복사
      for(var i=0;i<sec.length;i++) chunks.push(sec[i]);
      cur=cur<fat.length?fat[cur]:0xFFFFFFFE;
    }
    return new Uint8Array(chunks); // 완전히 새로운 ArrayBuffer
  }
  
  // 디렉토리에서 Workbook 스트림 찾기
  var dirData=readChain(firstDir);
  var dirDv=new DataView(dirData.buffer,dirData.byteOffset,dirData.byteLength);
  var wbStart=null,wbSize=0;
  for(var i=0;i<dirData.length/128;i++){
    var off=i*128;
    var nlen=dirDv.getUint16(off+64,true);
    if(nlen<2) continue;
    var name="";
    for(var j=0;j<(nlen-2)/2;j++) name+=String.fromCharCode(dirDv.getUint16(off+j*2,true));
    if(name==="Workbook"||name==="Book"){
      wbStart=dirDv.getUint32(off+116,true);
      wbSize=dirDv.getUint32(off+120,true);
      break;
    }
  }
  if(wbStart===null){alert("Workbook 스트림을 찾을 수 없습니다.");return;}
  
  var wbChain=readChain(wbStart).slice(0,wbSize);
  // ★ slice()는 같은 buffer를 공유할 수 있으므로 반드시 새 ArrayBuffer로 복사
  var wbData=new Uint8Array(wbChain);
  var wbDv=new DataView(wbData.buffer,wbData.byteOffset,wbData.byteLength);
  
  // SST 파싱
  var sstStrings=[];
  var pos=0;
  while(pos<wbData.length-4){
    var rtype=wbDv.getUint16(pos,true);
    var rlen=wbDv.getUint16(pos+2,true);
    if(rtype===0x00FC){ // SST
      var unique=wbDv.getUint32(pos+8,true);
      var off2=pos+12;
      for(var si=0;si<unique&&off2<pos+4+rlen;si++){
        var slen=wbDv.getUint16(off2,true);
        var flags=wbDv.getUint8(off2+2);
        off2+=3;
        if(flags&0x04){var rt2=wbDv.getUint16(off2,true);off2+=2+rt2*4;}
        if(flags&0x08){var sz2=wbDv.getUint32(off2,true);off2+=4+sz2;}
        var s="";
        if(flags&0x01){
          for(var ci2=0;ci2<slen;ci2++) s+=String.fromCharCode(wbDv.getUint16(off2+ci2*2,true));
          off2+=slen*2;
        } else {
          for(var ci2=0;ci2<slen;ci2++) s+=String.fromCharCode(wbDv.getUint8(off2+ci2));
          off2+=slen;
        }
        sstStrings.push(s);
      }
    }
    pos+=4+rlen;
    if(rlen===0)break;
  }
  
  // 셀 데이터 파싱 (row,col,value)
  var cells={};
  pos=0;
  while(pos<wbData.length-4){
    var rtype=wbDv.getUint16(pos,true);
    var rlen=wbDv.getUint16(pos+2,true);
    if(rlen>0){
      if(rtype===0x00FD&&rlen>=10){ // LabelSst
        var r=wbDv.getUint16(pos+4,true),cl=wbDv.getUint16(pos+6,true);
        var idx=wbDv.getUint32(pos+10,true);
        if(!cells[r])cells[r]={};
        cells[r][cl]=idx<sstStrings.length?sstStrings[idx]:"";
      } else if(rtype===0x0203&&rlen>=14){ // Number
        var r=wbDv.getUint16(pos+4,true),cl=wbDv.getUint16(pos+6,true);
        var v=wbDv.getFloat64(pos+10,true);
        if(!cells[r])cells[r]={};
        cells[r][cl]=v;
      } else if(rtype===0x027E&&rlen>=10){ // RK
        var r=wbDv.getUint16(pos+4,true),cl=wbDv.getUint16(pos+6,true);
        var rk=wbDv.getUint32(pos+10,true);
        var v2;
        if(rk&0x02){v2=(rk>>2)/((rk&0x01)?100:1);}
        else{var buf=new ArrayBuffer(8);new DataView(buf).setUint32(0,rk&0xFFFFFFFC,true);v2=new DataView(buf).getFloat64(0,true);if(rk&0x01)v2/=100;}
        if(!cells[r])cells[r]={};
        cells[r][cl]=v2;
      } else if(rtype===0x00BD&&rlen>=6){ // MulRk
        var r=wbDv.getUint16(pos+4,true),cfirst=wbDv.getUint16(pos+6,true);
        var off3=8;
        while(off3+5<rlen){
          var rk=wbDv.getUint32(pos+4+off3+2,true);
          var v3;
          if(rk&0x02){v3=(rk>>2)/((rk&0x01)?100:1);}
          else{var buf=new ArrayBuffer(8);new DataView(buf).setUint32(0,rk&0xFFFFFFFC,true);v3=new DataView(buf).getFloat64(0,true);if(rk&0x01)v3/=100;}
          if(!cells[r])cells[r]={};
          cells[r][cfirst+Math.floor((off3-8)/6)]=v3;
          off3+=6;
        }
      }
    }
    pos+=4+rlen;
    if(rlen===0)break;
  }
  
  // 출금 내역 추출 (농협: col3=출금, col6=거래내용, col7=거래기록사항)
  var withdrawals=[];
  var rowNums=Object.keys(cells).map(Number).sort(function(a,b){return a-b;});
  console.log('[NH XLS] SST:', sstStrings.length, '셀행수:', rowNums.length, '범위:', rowNums[0], '~', rowNums[rowNums.length-1]);
  for(var ri=0;ri<rowNums.length;ri++){
    var rn=rowNums[ri];
    if(rn<11)continue;
    var row=cells[rn];
    var outAmt=Number(row[3])||0;
    var desc=String(row[7]||"").trim();
    var content=String(row[6]||"").trim();
    if(outAmt>0){
      withdrawals.push({amt:outAmt,desc:desc,content:content});
      console.log('[NH XLS] 출금:', outAmt, '|', content, '|', desc);
    }
  }
  console.log('[NH XLS] 총 출금내역:', withdrawals.length, '건');
  
  applyMatchRules(withdrawals);
}
function parseRowsToMonthly(rows, filename){
  // xlsx 거래내역 (기업은행 등)
  var ci={out:2,desc:5,content:4}; // 기본값
  var dataStart=3;
  for(var ri=0;ri<Math.min(rows.length,8);ri++){
    var row=rows[ri]||[];
    for(var cj=0;cj<row.length;cj++){
      var v=String(row[cj]||"").replace(/\s/g,"");
      if(v==="출금"||v==="출금금액") ci.out=cj;
      if(v.indexOf("거래내용")>=0||v.indexOf("적요")>=0) ci.desc=cj;
      if(v.indexOf("거래기록")>=0||v.indexOf("상대")>=0) ci.content=cj;
    }
    if(ci.out>=0){dataStart=ri+1;break;}
  }
  var withdrawals=[];
  for(var ri=dataStart;ri<rows.length;ri++){
    var row=rows[ri];if(!row)continue;
    var amt=Math.round(Number(String(row[ci.out]||"0").replace(/,/g,""))||0);
    var desc=String(row[ci.desc]||"").trim();
    var content=String(row[ci.content]||"").trim();
    if(amt>0&&(desc||content)) withdrawals.push({amt:amt,desc:desc,content:content});
  }
  applyMatchRules(withdrawals);
}
function applyMatchRules(withdrawals){
  monSnapshot(); // 업로드 전 스냅샷

  // ★ 납부목록 xlsx가 로드됐으면 그 항목 기준으로, 아니면 기본 규칙 사용
  var items = LOADED_MONTHLY_ITEMS || null;

  var monthKey = G.mMonth;
  var matched = [], unmatched = [];
  var usedIdx = {};

  // ★ 항목명 → 거래 상대방 키워드 매핑 (소장님이 알려주신 규칙)
  // 출금/입금 내역 모두에서 찾음 (농협 desc=거래기록사항, content=거래내용)
  var NAME_KW = {
    "반찬값":                        ["김태환","행복예찬"],
    "전기요금":                      ["전기료","한국전력","전기요금"],
    "삼성sds 전화기":                ["삼성에스디에","삼성sds"],
    "삼성sds 전화기 부가서비스":      [], // ★ 자동 매칭 안 함
    "s k 쉴더스":                    ["SK쉴더스","쉴더스"],
    "음식물쓰레기 관리비":            ["E편한세상광교","편한세상광교입주자"],
    "복합기":                        ["피앤알솔루션","카피어"],
    "삼성 화재":                     ["삼성화"],
    "상가공용요금":                  ["김은경"],
    "상가공용요금(정육)":             ["김은경"],
    "김민학 하이스트 월세":           ["(주)하이스트"],
    "김민학 하이스트 컨설팅 보수료":  ["(주)하이스트"],
    "이유진 하이스트 월세":           ["이유진(광교"],
    "103호 뒤 사무실 월세":          ["이유진(광교"],
    "세무사기장":                    ["와이즈앤텍스"],
    "정수기":                        ["SK인텔릭스","인텔릭스"],
    "포스 사용료":                   ["한소프트"],
    "tv 요금":                       ["SKYLIFE","스카이라이프"],
    "사무실 업무폰":                  ["SKYLIFE"],
    "사무실 인터넷":                  ["KT통신요금"],
    "사무실 팩스":                   ["KT02168993","KT0216"],
    "102호 월세":                    [],
    "102호 월세(현금)":              [],
    "103호 월세":                    ["지앤씨","거인크라디온"],
  };

  // ★ 거래내역 텍스트에서 앞뒤 숫자(월 표시) 제거 후 핵심만 비교
  function stripMonthNum(s){
    // 앞 숫자(날짜) 제거: "05삼성에스디에" → "삼성에스디에"
    // 뒤 숫자(월) 제거: "KT통신요금05" → "KT통신요금", "SKYLIFE2605" → "SKYLIFE"
    return s.replace(/^\d+/,"").replace(/\d+$/,"").toLowerCase();
  }

  function kwMatch(kw, descAll){
    var kwL = kw.toLowerCase();
    var kwStripped = stripMonthNum(kw);
    // 원본 키워드로 먼저 매칭
    if(descAll.indexOf(kwL)>=0) return true;
    // 앞뒤 숫자 제거 후 매칭 (3글자 이상일 때만)
    if(kwStripped.length>=3 && descAll.indexOf(kwStripped)>=0) return true;
    return false;
  }

  function matchItem(name, sub, baseAmt){
    // 이 항목에 대한 키워드 목록
    var kws = [];
    // 항목명 기준 키워드
    var nameL = name.toLowerCase();
    Object.keys(NAME_KW).forEach(function(k){
      // ★ 정확히 일치할 때만 (부분 매칭 금지 - 항목 간 키워드 섞임 방지)
      if(nameL === k.toLowerCase()){
        NAME_KW[k].forEach(function(kw){ if(kws.indexOf(kw)<0) kws.push(kw); });
      }
    });
    // LOADED_MONTHLY_ITEMS에서 이 항목의 keywords도 추가
    if(items){
      items.forEach(function(it){
        if(it.name.toLowerCase()===nameL && it.keywords){
          it.keywords.forEach(function(kw){ if(kws.indexOf(kw)<0) kws.push(kw); });
        }
      });
    }

    var found = null, foundIdx = -1;
    for(var i=0;i<withdrawals.length;i++){
      if(usedIdx[i]) continue;
      var w = withdrawals[i];
      var descAll = (w.desc + "|" + w.content).toLowerCase();

      // 1순위: 키워드 매칭 (앞뒤 숫자 제거 후 비교)
      var kwMatched = kws.some(function(k){ return kwMatch(k, descAll); });
      // 2순위: 정확 금액
      var amtMatch = baseAmt>0 && w.amt===baseAmt;
      // 3순위: ±3% 근사 (1만원 이상)
      var nearMatch = baseAmt>10000 && Math.abs(w.amt-baseAmt)/baseAmt<0.03;

      if(kwMatched || amtMatch || nearMatch){ found=w; foundIdx=i; break; }
    }
    return {found:found, foundIdx:foundIdx};
  }

  // 처리할 항목 목록 결정
  var itemList = items || [];
  if(!items){
    // 기본 목록: 현재 MONTHLY에서 가져옴
    var curItems = MONTHLY[monthKey] || [];
    curItems.forEach(function(it){
      itemList.push({sub:it.sub, name:it.name, baseAmt:it.amt||0, keywords:[]});
    });
  }

  // ★ 고정 항목 - 거래내역으로 절대 변경하지 않음
  var FIXED_NAMES=["102호 월세","102호 월세(현금)","103호 뒤 사무실 월세","이유진 하이스트 월세","김민학 하이스트 월세"];

  itemList.forEach(function(item){
    // 고정 항목은 건드리지 않음
    if(FIXED_NAMES.some(function(n){return item.name===n;})){
      return; // skip
    }
    var r = matchItem(item.name, item.sub, item.baseAmt);
    if(r.found){
      usedIdx[r.foundIdx] = true;
      setMA(monthKey, item.sub, item.name, r.found.amt);
      matched.push({name:item.name, amt:r.found.amt, desc:r.found.desc||r.found.content});
    } else {
      setMA(monthKey, item.sub, item.name, 0);
      unmatched.push(item.name);
    }
  });

  saveMonthlyEdits(); // 업로드 후 자동 저장
  G.uploadMsg = "✅ " + matched.length + "개 자동 반영 / " + unmatched.length + "개 미매칭(0)";
  R();

  var msg = "✅ 거래내역 분석 완료! ";
  msg += " [반영 " + matched.length + "개] ";
  matched.forEach(function(m){ msg += m.name + " (" + m.amt.toLocaleString() + ") "; });
  if(unmatched.length){
    msg += " / [0 처리 " + unmatched.length + "개] ";
    unmatched.forEach(function(n){ msg += n + " "; });
  }
  alert(msg);
}
function loadMonthlyList(file){
  var XLSX=window.XLSX;
  if(!XLSX){alert("SheetJS 로딩 실패");return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    var wb=XLSX.read(ev.target.result,{type:"array"});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
    
    var items=[];
    for(var ri=3;ri<rows.length;ri++){ // 행4부터 데이터
      var row=rows[ri];
      var sub=String(row[1]||"").trim();
      var name=String(row[2]||"").trim();
      var baseAmt=Number(String(row[3]||"0").replace(/[^0-9]/g,""))||0;
      var kCol=String(row[10]||"").trim(); // K열: 거래내역 확인
      
      if(!name||name.length<2)continue;
      
      // sub 정규화
      var subMap={"8050-7777":"이편한세상","하이스트":"하이스트","정육":"정육","이편한세상":"이편한세상","통합":"통합"};
      sub=subMap[sub]||sub;
      
      // K열에서 매칭 키워드 추출
      // 형식1: "26/05/15 SK쉴더스동수원월정료" → 날짜 제거 후 키워드
      // 형식2: "자동이체(별도 내역 미확인)" → 금액으로만 매칭
      var keywords=[];
      var kParts=kCol.split(" ");
      if(kParts.length>=2&&kParts[0].match(/^\d{2}\/\d{2}/)){
        // 날짜 형식 있음 → 나머지가 키워드
        var kwPart=kParts.slice(2).join(" ").trim();
        if(kwPart&&kwPart.length>2&&kwPart.indexOf("자동이체")<0&&kwPart.indexOf("펌이체")<0){
          // 추가로 분리 (예: "NH올원뱅크→(주)하이스트" → "(주)하이스트")
          if(kwPart.indexOf("→")>=0) kwPart=kwPart.split("→")[1];
          if(kwPart.indexOf(" ")>=0){
            // 여러 단어면 각각 키워드로
            kwPart.split(" ").forEach(function(k){if(k.length>2)keywords.push(k);});
          } else {
            keywords.push(kwPart);
          }
        }
      }
      // 항목명 자체도 키워드로 (예: "삼성에스디에", "피앤알솔루션")
      // K열 전체에서 특징적인 단어 추가
      var specialWords=["SK쉴더스","삼성에스디에","SK인텔릭스","와이즈앤텍스","피앤알","한소프트","SKYLIFE","KT0216","삼성화","E편한세상광교"];
      specialWords.forEach(function(w){if(kCol.indexOf(w)>=0&&keywords.indexOf(w)<0)keywords.push(w);});
      
      items.push({sub:sub,name:name,baseAmt:baseAmt,keywords:keywords,kCol:kCol});
    }
    
    LOADED_MONTHLY_ITEMS=items;
    G.uploadMsg="✅ 납부목록 "+items.length+"개 로드 완료 → ② 거래내역 매칭 버튼을 눌러주세요";
    R();
  };
  reader.readAsArrayBuffer(file);
}

function bindSalary(){

    try{localStorage.setItem("gg_last_month",this.value);}catch(e){}

  };

    if(btn){btn.textContent="✅ 저장됨";setTimeout(function(){if(g("sal_save"))g("sal_save").textContent="💾 저장";},2000);}

  });
  document.querySelectorAll(".em-memo-inp").forEach(function(inp){
    inp.onchange=function(){SAL.emItems[Number(this.dataset.idx)].memo=this.value;saveSAL();};

  });
  // ★ 클로저로 인덱스 캡처 - 강일임(0)은 0번, 강재미(1)는 1번에만 적용
  SAL.staff.forEach(function(st,i){
    (function(idx){

      if(snEl)snEl.onchange=function(){
        var oldName=SAL.staff[idx].name, newName=this.value;
        SAL.staff[idx].name=newName;
        if(G.salIncPct[oldName]!==undefined){G.salIncPct[newName]=G.salIncPct[oldName];delete G.salIncPct[oldName];}

function bindMonthly(){
  if(g("mmonth"))g("mmonth").onchange=function(){G.mMonth=this.value;G.uploadMsg="";try{localStorage.setItem("gg_last_mmonth",this.value);}catch(e){}R();};

  // ★ 새 월 직접 입력
  function addNewMonth(){
    var val=(g("mmonth-new")?g("mmonth-new").value:"").trim();
    if(!val)return;
    var m=val.match(/(\d{2,4})-(\d{1,2})/);
    if(!m){alert("형식 예) 26-6");return;}
    var yr=m[1].length===4?m[1].slice(2):m[1];
    var key=yr+"-"+String(Number(m[2]));
    if(!MONTHLY[key]){
      var latest=Object.keys(MONTHLY).sort(function(a,b){return a>b?-1:1;})[0];
      MONTHLY[key]=latest&&MONTHLY[latest]?
        MONTHLY[latest].map(function(it){return {cat:it.cat,sub:it.sub,name:it.name,amt:0};}):[];
      try{localStorage.setItem("gg_monthly_extra", JSON.stringify(MONTHLY));}catch(e){}
      if(window.fbSaveMonthlyStructure) window.fbSaveMonthlyStructure(MONTHLY);
    }
    G.mMonth=key;G.uploadMsg="";
    try{localStorage.setItem("gg_last_mmonth",key);}catch(e){}
    if(g("mmonth-new"))g("mmonth-new").value="";
    R();
  }
  if(g("mmonth-add"))g("mmonth-add").onclick=addNewMonth;
  if(g("mmonth-new"))g("mmonth-new").onkeydown=function(e){if(e.key==="Enter")addNewMonth();};

  // ★ 저장
  if(g("msave"))g("msave").onclick=function(){
    saveMonthlyEdits();
    G.uploadMsg="💾 저장됨";R();
    setTimeout(function(){G.uploadMsg="";R();},2000);
  };

  // ★ 초기화
  if(g("mreset"))g("mreset").onclick=function(){
    if(!confirm(G.mMonth+"월 입력값을 모두 초기화하시겠습니까?"))return;
    monSnapshot();
    var prefix=G.mMonth+"__";
    Object.keys(MONTHLY_EDITS).forEach(function(k){
      if(k.indexOf(prefix)===0)delete MONTHLY_EDITS[k];
    });
    saveMonthlyEdits();
    G.uploadMsg="🔄 "+G.mMonth+"월 초기화 완료";R();
  };

  // ★ 거래내역 업로드
  if(g("mupload"))g("mupload").onclick=function(){
    var inp=document.createElement("input");
    inp.type="file";inp.accept=".xlsx,.xls,.csv";
    inp.onchange=function(){
      if(!inp.files[0])return;
      var file=inp.files[0];
      function readFile(f){
        var reader=new FileReader();
        reader.onload=function(ev){
          try{parseMonthlyExcel(f.name,ev.target.result);}
          catch(err){alert("파싱 오류: "+err.message);}
        };
        reader.readAsArrayBuffer(f);
      }
      if(!window.XLSX){
        var s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload=function(){readFile(file);};
        document.head.appendChild(s);
      } else {readFile(file);}
    };
    inp.click();
  };

  // 금액 입력
  document.querySelectorAll(".mnth-inp").forEach(function(inp){
    inp.onclick=function(e){e.stopPropagation();};
    inp.onchange=function(){monSnapshot();setMA(this.dataset.sel,this.dataset.sub,this.dataset.name,numParse(this.value));R();};
  });

  // ★ 기타 항목 추가/삭제/이름 수정
  if(g("mright_add"))g("mright_add").onclick=function(e){
    e.stopPropagation();
    monSnapshot();
    if(!MONTHLY[G.mMonth])MONTHLY[G.mMonth]=[];
    MONTHLY[G.mMonth].push({cat:"사무실",sub:"기타",name:"",amt:0});
    try{localStorage.setItem("gg_monthly_extra", JSON.stringify(MONTHLY));}catch(e2){}
    if(window.fbSaveMonthlyStructure) window.fbSaveMonthlyStructure(MONTHLY);
    R();
  };
  document.querySelectorAll(".mright-del").forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      monSnapshot();
      MONTHLY[G.mMonth].splice(Number(btn.dataset.idx),1);
      try{localStorage.setItem("gg_monthly_extra", JSON.stringify(MONTHLY));}catch(e2){}
      if(window.fbSaveMonthlyStructure) window.fbSaveMonthlyStructure(MONTHLY);
      R();
    };
  });
  document.querySelectorAll(".mright-name").forEach(function(inp){
    inp.onclick=function(e){e.stopPropagation();};
    inp.onchange=function(){
      monSnapshot();
      MONTHLY[G.mMonth][Number(this.dataset.idx)].name=this.value;
      try{localStorage.setItem("gg_monthly_extra", JSON.stringify(MONTHLY));}catch(e2){}
      if(window.fbSaveMonthlyStructure) window.fbSaveMonthlyStructure(MONTHLY);
      R();
    };
  });
}

function gatherBackupData(){
  var salaryAll={};
  try{
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&(k.indexOf("sal_")===0||k.indexOf("salp_")===0)){
        try{salaryAll[k]=JSON.parse(localStorage.getItem(k));}catch(e){}
      }
    }
  }catch(e){}
  return {
    _type:"gwanggyo_backup",
    _version:1,
    _date:new Date().toISOString(),
    contracts:CONTRACTS,
    extrafees:EXTRAFEES,
    monthly:MONTHLY,
    monthlyEdits:MONTHLY_EDITS,
    salary:salaryAll
  };
}
function exportFullBackup(){
  var data=gatherBackupData();
  var json=JSON.stringify(data,null,2);
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([json],{type:"application/json;charset=utf-8;"}));
  a.download="광교이편한세상_백업_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
}
function applyBackupData(data){
  if(!data||data._type!=="gwanggyo_backup"){alert("올바른 백업 파일이 아닙니다.");return;}
  if(!confirm("백업 파일("+(data._date?data._date.slice(0,10):"")+")로 현재 데이터를 덮어씁니다. 계속할까요?"))return;
  if(data.contracts){CONTRACTS=data.contracts;if(window.fbSaveContracts)window.fbSaveContracts(CONTRACTS);}
  if(data.extrafees){EXTRAFEES=data.extrafees;if(window.fbSaveExtraFees)window.fbSaveExtraFees(EXTRAFEES);}
  if(data.monthly){
    Object.keys(data.monthly).forEach(function(k){MONTHLY[k]=data.monthly[k];});
    try{localStorage.setItem("gg_monthly_extra",JSON.stringify(MONTHLY));}catch(e){}
    if(window.fbSaveMonthlyStructure)window.fbSaveMonthlyStructure(MONTHLY);
  }
  if(data.monthlyEdits){
    MONTHLY_EDITS=data.monthlyEdits;
    try{localStorage.setItem("mon_edits",JSON.stringify(MONTHLY_EDITS));}catch(e){}
    if(window.fbSaveMonthly)window.fbSaveMonthly(MONTHLY_EDITS);
  }
  if(data.salary){
    Object.keys(data.salary).forEach(function(k){
      try{localStorage.setItem(k,JSON.stringify(data.salary[k]));}catch(e){}
    });
    loadSAL(SAL.month);
    if(window.fbSaveSalary) window.fbSaveSalary(SAL.month,SAL,G.salIncPct);
  }
  alert("복원 완료");
  R();
}
function triggerRestoreFile(file){
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      applyBackupData(data);
    }catch(e){alert("파일을 읽을 수 없습니다: "+e.message);}
  };
  reader.readAsText(file);
}

      (MONTHLY[mk]||[]).forEach(function(it){

      });

    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(mRows),"매달납부");

    var sRows=[["월","직원명","기본급","인센티브","실수령"]];

    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=build;
    document.head.appendChild(s);
  } else { build(); }
}
