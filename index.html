<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#222;}
input,select,textarea,button{font-family:'Noto Sans KR',sans-serif;}

/* 로그인 */
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:center;}
.login-box{background:rgba(255,255,255,0.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:52px 44px;width:400px;box-shadow:0 30px 70px rgba(0,0,0,.5);}
.login-logo{text-align:center;margin-bottom:36px;}
.login-logo .icon{width:68px;height:68px;background:linear-gradient(135deg,#c0392b,#e74c3c);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px;box-shadow:0 8px 24px rgba(192,57,43,.4);}
.login-logo h1{color:#fff;font-size:20px;font-weight:900;}
.login-logo p{color:rgba(255,255,255,.45);font-size:13px;margin-top:4px;}
.login-inp{width:100%;padding:14px 15px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:13px;color:#fff;font-size:14px;outline:none;margin-bottom:12px;}
.login-inp::placeholder{color:rgba(255,255,255,.35);}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(192,57,43,.45);}
.login-err{background:rgba(231,76,60,.18);border:1px solid rgba(231,76,60,.5);color:#ff8a80;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;text-align:center;}
.login-hint{margin-top:24px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:12px;color:rgba(255,255,255,.35);line-height:1.9;}

/* 레이아웃 */
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:62px;box-shadow:0 2px 20px rgba(0,0,0,.35);position:sticky;top:0;z-index:100;}
.header-logo{display:flex;align-items:center;gap:12px;}
.header-logo .ico{width:34px;height:34px;background:linear-gradient(135deg,#c0392b,#e74c3c);border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-size:17px;}
.header-logo span{color:#fff;font-weight:900;font-size:16px;}
.header-logo small{color:rgba(255,255,255,.4);font-size:12px;margin-left:6px;}
.header-right{display:flex;align-items:center;gap:12px;}
.user-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:6px 14px;font-size:13px;color:rgba(255,255,255,.75);}
.admin-tag{background:#c0392b;color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:8px;font-weight:700;}
.logout-btn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:6px 14px;font-size:12px;cursor:pointer;}

.tabs{background:#fff;border-bottom:2px solid #eee;padding:0 28px;display:flex;}
.tab-btn{padding:15px 22px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:700;color:#777;border-bottom:3px solid transparent;transition:all .2s;}
.tab-btn.active{color:#c0392b;border-bottom:3px solid #c0392b;}

.content{padding:24px 28px;max-width:1440px;margin:0 auto;}

/* 카드 */
.card{background:#fff;border-radius:16px;box-shadow:0 2px 14px rgba(0,0,0,.07);overflow:hidden;}
.card-header{padding:13px 20px;}
.card-header h3{color:#fff;font-size:15px;font-weight:800;margin:0;}
.card-body{padding:16px 20px;}

/* 그리드 */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.grid-full{grid-column:1/-1;}

.stat-card{background:#fff;border-radius:16px;box-shadow:0 2px 14px rgba(0,0,0,.07);padding:20px 22px;border-left:4px solid #ccc;cursor:pointer;}
.stat-card .label{font-size:12px;color:#aaa;font-weight:600;margin-bottom:6px;}
.stat-card .value{font-size:20px;font-weight:900;color:#1a1a2e;}

/* 필터 바 */
.filter-bar{background:#fff;border-radius:16px;box-shadow:0 2px 14px rgba(0,0,0,.07);padding:14px 18px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.inp{padding:10px 13px;border:1px solid #e0e0e0;border-radius:10px;font-size:13px;outline:none;background:#fafafa;color:#333;}
.inp:focus{border-color:#c0392b;}
.inp-full{width:100%;}
.sel{padding:10px 13px;border:1px solid #e0e0e0;border-radius:10px;font-size:13px;outline:none;background:#fafafa;color:#333;cursor:pointer;}
.btn-primary{padding:10px 18px;background:linear-gradient(135deg,#c0392b,#a93226);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-secondary{padding:10px 18px;background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-danger{background:none;border:1px solid #fcc;border-radius:6px;color:#e74c3c;font-size:11px;padding:3px 8px;cursor:pointer;}
.btn-small{padding:5px 10px;font-size:11px;background:none;border:1px solid #ddd;border-radius:6px;cursor:pointer;color:#555;}

/* 테이블 */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:12px 14px;text-align:left;color:#555;font-weight:700;font-size:12px;border-bottom:2px solid #e8ecf0;background:#f8f9fa;white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;font-size:13px;}
tr:hover td{background:#fff8f8;}
.tc{text-align:center;}

/* 배지 */
.badge{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:#fff;border-radius:20px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.35);}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal-hd h2{font-size:18px;font-weight:900;color:#1a1a2e;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-full{grid-column:1/-1;}
label.lbl{display:block;font-size:12px;color:#888;font-weight:700;margin-bottom:5px;}
.fee-box{background:#f8f9fa;border-radius:14px;padding:18px;border:1px solid #eee;margin-top:18px;}
.fee-box .fee-title{font-weight:700;font-size:14px;color:#333;margin-bottom:14px;}
.fee-total{display:flex;justify-content:space-between;background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e0e0e0;margin-top:12px;font-size:13px;}
.modal-foot{display:flex;gap:10px;margin-top:22px;justify-content:flex-end;}

/* 급여 row */
.sal-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f3f3f3;}
.sal-row.bold .label{font-weight:800;color:#1a1a2e;}

/* 알림 */
.alert-yellow{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:9px 16px;margin-bottom:12px;font-size:13px;color:#795548;font-weight:600;}
</style>

function bindLogin(){
  const doLogin = ()=>{
    const id=document.getElementById("lid").value;
    const pw=document.getElementById("lpw").value;
    const acc=ACCOUNTS.find(a=>a.id===id&&a.pw===pw);
    if(acc){state.user=acc;render();}
    else{const e=document.getElementById("login-err");e.style.display="block";e.textContent="아이디 또는 비밀번호가 틀렸습니다.";}
  };
  document.getElementById("lbtn").onclick=doLogin;
  document.getElementById("lpw").onkeydown=e=>{if(e.key==="Enter")doLogin();};
  document.getElementById("lid").onkeydown=e=>{if(e.key==="Enter")document.getElementById("lpw").focus();};
}

    if(state.cSearch){const q=state.cSearch.toLowerCase();return c.property?.toLowerCase().includes(q)||c.assignee?.toLowerCase().includes(q)||c.amount?.toLowerCase().includes(q)||c.type?.toLowerCase().includes(q)||c.note?.toLowerCase().includes(q);}

function renderSalary(){
  const u=state.user;
  const isAdmin=u.role==="admin";
  const d=SALARY;
  const rev=d.revenue_regular+d.revenue_other;
  const exp=d.expense_office+d.expense_ad+d.expense_delivery+d.expense_misc;
  const totalBase=d.staff.reduce((s,x)=>s+x.base,0);
  const totalInc=d.staff.reduce((s,x)=>s+x.incentive,0);
  const totalSal=totalBase+totalInc;
  const profit=rev-exp-totalSal;
  const myRow=d.staff.find(s=>u.name.includes(s.name.split(" ")[0]));

  const salRow=(label,value,editable,id,bold,highlight)=>`
    <div class="sal-row${bold?" bold":""}${highlight?" highlight":""}">
      <span class="label">${label}</span>
      ${editable&&!bold
        ?`<input class="inp" style="width:150px;text-align:right;padding:6px 10px;font-size:13px" id="${id}" type="number" value="${value}">`
        :`<span class="val">₩${money(value)}</span>`}
    </div>`;

  return `
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap">
    <h2 style="margin:0;font-size:18px;font-weight:900;color:#1a1a2e">💰 급여 정산표</h2>
    <input class="inp" type="month" id="sal-month" value="${d.month}" style="width:170px">
    ${!isAdmin&&myRow?`<div style="background:#e8f8f0;border:1px solid #27ae60;border-radius:10px;padding:9px 18px;font-size:13px;color:#1e8449;font-weight:700">내 실수령액: ₩${money(myRow.base+myRow.incentive)}</div>`:""}
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header" style="background:linear-gradient(135deg,#2980b9,#2471a3)"><h3>📈 사무실 수입</h3></div>
      <div class="card-body">
        ${salRow("일반 수수료",d.revenue_regular,isAdmin,"sal-rev-regular")}
        ${salRow("기타 수수료",d.revenue_other,isAdmin,"sal-rev-other")}
        ${salRow("합 계",rev,false,"",true,true)}
      </div>
    </div>
    <div class="card">
      <div class="card-header" style="background:linear-gradient(135deg,#c0392b,#a93226)"><h3>📉 사무실 지출</h3></div>
      <div class="card-body">
        ${salRow("사무실 지출",d.expense_office,isAdmin,"sal-exp-office")}
        ${salRow("광고비",d.expense_ad,isAdmin,"sal-exp-ad")}
        ${salRow("배달·식비쿠폰",d.expense_delivery,isAdmin,"sal-exp-delivery")}
        ${salRow("기타",d.expense_misc,isAdmin,"sal-exp-misc")}
        ${salRow("합 계",exp,false,"",true,true)}
      </div>
    </div>
    <div class="card grid-full">
      <div class="card-header" style="background:linear-gradient(135deg,#27ae60,#229954)"><h3>👥 직원 급여 현황</h3></div>
      <div class="card-body">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th class="tc">직원명</th><th class="tc">기본급</th><th class="tc">인센티브</th><th class="tc">실수령액</th>
              ${isAdmin?"<th class='tc'></th>":""}
            </tr></thead>
            <tbody>
              ${d.staff.map((s,i)=>{
                const canInc=isAdmin||u.name.includes(s.name.split(" ")[0]);
                return `<tr style="background:${i%2===0?"#fff":"#fafbfc"}">
                  <td class="tc"><strong>${isAdmin?`<input class="inp" style="width:130px;text-align:center;font-weight:700" id="sn-${i}" value="${s.name}">`:s.name}</strong></td>
                  <td class="tc">${isAdmin?`<input class="inp" style="width:120px;text-align:right" id="sb-${i}" type="number" value="${s.base}">`:`<span>₩${money(s.base)}</span>`}</td>
                  <td class="tc">${canInc?`<input class="inp" style="width:130px;text-align:right" id="si-${i}" type="number" value="${s.incentive}">`:`<span style="color:#27ae60;font-weight:600">₩${money(s.incentive)}</span>`}</td>
                  <td class="tc" style="font-weight:800;color:#c0392b;font-size:15px">₩${money(s.base+s.incentive)}</td>
                  ${isAdmin?`<td class="tc"><button class="btn-danger sal-del-staff" data-si="${i}">삭제</button></td>`:""}
                </tr>`;
              }).join("")}
              <tr style="background:#fffbf0;font-weight:800">
                <td class="tc" style="color:#795548">합 계</td>
                <td class="tc" style="color:#795548">₩${money(totalBase)}</td>
                <td class="tc" style="color:#795548">₩${money(totalInc)}</td>
                <td class="tc" style="color:#c0392b;font-size:16px">₩${money(totalSal)}</td>
                ${isAdmin?"<td></td>":""}
              </tr>
            </tbody>
          </table>
        </div>
        ${isAdmin?`<button class="btn-secondary" id="sal-add-staff" style="margin-top:12px;font-size:12px">＋ 직원 추가</button>`:""}
      </div>
    </div>
    ${isAdmin?`
    <div class="card grid-full">
      <div class="card-header" style="background:linear-gradient(135deg,#8e44ad,#7d3c98)"><h3>🏆 최종 수익 정산</h3></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:8px 0">
          ${[
            {label:"총 수입",    val:rev,      color:"#2980b9"},
            {label:"총 지출",    val:exp,      color:"#e74c3c"},
            {label:"총 직원급여",val:totalSal, color:"#e67e22"},
            {label:"🏢 하이스트 수익",val:profit,color:"#27ae60"},
          ].map(x=>`<div style="background:${x.color}10;border:2px solid ${x.color}30;border-radius:14px;padding:18px 16px;text-align:center">
            <div style="font-size:12px;color:#888;font-weight:600;margin-bottom:8px">${x.label}</div>
            <div style="font-size:18px;font-weight:900;color:${x.color}">₩${money(x.val)}</div>
          </div>`).join("")}
        </div>
      </div>
    </div>`:""}
  </div>`;
}

// ══════════════════════════════════════════════
//  이벤트 바인딩
// ══════════════════════════════════════════════
function bindMain(){
  // 로그아웃
  document.getElementById("logout-btn").onclick=()=>{state.user=null;render();};

  // 탭
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.onclick=()=>{state.tab=b.dataset.tab;render();};
  });

  if(state.tab==="contracts") bindContracts();
  if(state.tab==="customers") bindCustomers();
  if(state.tab==="salary")    bindSalary();
  if(state.cModal)  bindContractModal();
  if(state.cuModal) bindCustomerModal();
}

function bindContracts(){
  const el=id=>document.getElementById(id);
  el("c-search")?.addEventListener("input",e=>{state.cSearch=e.target.value;render();});
  el("c-year")?.addEventListener("change",e=>{state.cYear=e.target.value;render();});
  el("c-staff")?.addEventListener("change",e=>{state.cStaff=e.target.value;render();});
  el("c-type")?.addEventListener("change",e=>{state.cType=e.target.value;render();});
  el("c-add-btn")?.addEventListener("click",()=>{state.cEdit=null;state.cModal=true;render();});
  document.querySelectorAll(".c-row").forEach(row=>{
    row.onclick=()=>{const c=CONTRACTS.find(x=>x.id===Number(row.dataset.cid));state.cEdit=c;state.cModal=true;render();};
  });
  document.querySelectorAll(".c-del-btn").forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();if(confirm("이 계약을 삭제하시겠습니까?")){CONTRACTS=CONTRACTS.filter(c=>c.id!==Number(btn.dataset.cid));render();}};
  });
}

function bindContractModal(){
  const el=id=>document.getElementById(id);
  const close=()=>{state.cModal=false;state.cEdit=null;render();};
  el("c-modal-close")?.onclick=close;
  el("c-modal-close2")?.onclick=close;
  el("c-modal-bg")?.onclick=e=>{if(e.target.id==="c-modal-bg")close();};

  // 수수료 실시간 합계
  ["seller_fee","seller_vat","buyer_fee","buyer_vat"].forEach(k=>{
    el("cf-"+k)?.addEventListener("input",()=>{
      const sf=(Number(el("cf-seller_fee")?.value)||0)+(Number(el("cf-seller_vat")?.value)||0);
      const bf=(Number(el("cf-buyer_fee")?.value)||0)+(Number(el("cf-buyer_vat")?.value)||0);
      const ft=document.querySelector(".fee-total");
      if(ft)ft.innerHTML=`<span>매도 합계: <strong style="color:#e74c3c">₩${money(sf)}</strong> &nbsp; 매수 합계: <strong style="color:#27ae60">₩${money(bf)}</strong></span><strong>총: ₩${money(sf+bf)}</strong>`;
    });
  });

  el("c-modal-save")?.onclick=()=>{
    const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
    const data={
      id:state.cEdit?.id||Date.now(),
      year:Number(g("cf-year")),assignee:g("cf-assignee"),
      contract_date:g("cf-contract_date"),mid_date:g("cf-mid_date"),
      final_date:g("cf-final_date"),type:g("cf-type"),
      amount:g("cf-amount"),property:g("cf-property"),
      seller_fee:Number(g("cf-seller_fee"))||0,seller_vat:Number(g("cf-seller_vat"))||0,
      buyer_fee:Number(g("cf-buyer_fee"))||0, buyer_vat:Number(g("cf-buyer_vat"))||0,
      note:g("cf-note"),
    };
    if(state.cEdit){CONTRACTS=CONTRACTS.map(c=>c.id===data.id?data:c);}
    else{CONTRACTS.push(data);}
    state.cModal=false;state.cEdit=null;render();
  };
}

function bindCustomers(){
  const el=id=>document.getElementById(id);
  el("cu-search")?.addEventListener("input",e=>{state.cuSearch=e.target.value;render();});
  el("cu-type")?.addEventListener("change",e=>{state.cuType=e.target.value;render();});
  el("cu-add-btn")?.addEventListener("click",()=>{state.cuEdit=null;state.cuModal=true;render();});
  document.querySelectorAll(".cu-row").forEach(row=>{
    row.onclick=()=>{const c=CUSTOMERS.find(x=>x.id===Number(row.dataset.cuid));state.cuEdit=c;state.cuModal=true;render();};
  });
  document.querySelectorAll(".cu-del-btn").forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();if(confirm("이 고객 정보를 삭제하시겠습니까?")){CUSTOMERS=CUSTOMERS.filter(c=>c.id!==Number(btn.dataset.cuid));render();}};
  });
  document.querySelectorAll("[data-cus]").forEach(el=>{
    el.onclick=()=>{state.cuStatus=state.cuStatus===el.dataset.cus?"all":el.dataset.cus;render();};
  });
}

function bindCustomerModal(){
  const el=id=>document.getElementById(id);
  const close=()=>{state.cuModal=false;state.cuEdit=null;render();};
  el("cu-modal-close")?.onclick=close;
  el("cu-modal-close2")?.onclick=close;
  el("cu-modal-bg")?.onclick=e=>{if(e.target.id==="cu-modal-bg")close();};
  el("cu-modal-save")?.onclick=()=>{
    const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
    const data={
      id:state.cuEdit?.id||Date.now(),
      name:g("cuf-name"),phone:g("cuf-phone"),type:g("cuf-type"),
      budget:g("cuf-budget"),desired:g("cuf-desired"),memo:g("cuf-memo"),
      status:g("cuf-status"),assignee:g("cuf-assignee"),reg_date:g("cuf-reg_date"),
    };
    if(state.cuEdit){CUSTOMERS=CUSTOMERS.map(c=>c.id===data.id?data:c);}
    else{CUSTOMERS.push(data);}
    state.cuModal=false;state.cuEdit=null;render();
  };
}

function bindSalary(){
  const el=id=>document.getElementById(id);
  const isAdmin=state.user.role==="admin";

  el("sal-month")?.addEventListener("change",e=>{SALARY.month=e.target.value;});

  if(isAdmin){
    const salInputs=[
      ["sal-rev-regular","revenue_regular"],["sal-rev-other","revenue_other"],
      ["sal-exp-office","expense_office"],  ["sal-exp-ad","expense_ad"],
      ["sal-exp-delivery","expense_delivery"],["sal-exp-misc","expense_misc"],
    ];
    salInputs.forEach(([id,key])=>{
      el(id)?.addEventListener("change",e=>{SALARY[key]=Number(e.target.value)||0;render();});
    });
    el("sal-add-staff")?.onclick=()=>{SALARY.staff.push({name:"새 직원",base:0,incentive:0});render();};
    document.querySelectorAll(".sal-del-staff").forEach(btn=>{
      btn.onclick=()=>{if(confirm("삭제할까요?")){SALARY.staff.splice(Number(btn.dataset.si),1);render();}};
    });
    SALARY.staff.forEach((_,i)=>{
      el("sn-"+i)?.addEventListener("change",e=>{SALARY.staff[i].name=e.target.value;render();});
      el("sb-"+i)?.addEventListener("change",e=>{SALARY.staff[i].base=Number(e.target.value)||0;render();});
      el("si-"+i)?.addEventListener("change",e=>{SALARY.staff[i].incentive=Number(e.target.value)||0;render();});
    });
  } else {
    SALARY.staff.forEach((_,i)=>{
      el("si-"+i)?.addEventListener("change",e=>{SALARY.staff[i].incentive=Number(e.target.value)||0;render();});
    });
  }
}

// 시작
render();
</script>
</body>
</html>
